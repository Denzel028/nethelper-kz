<style>

.splashText{margin-top:18px;font-size:28px;font-weight:900;color:var(--blue)}
.splashName{margin-top:8px;color:var(--muted);font-size:14px;letter-spacing:1px}
@keyframes pulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.08);filter:brightness(1.2)}}
@keyframes hideSplash{to{opacity:0;visibility:hidden}}
header{position:sticky;top:0;z-index:20;background:rgba(8,17,31,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:16px 14px 12px}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#67d3ff,#72df99);display:flex;align-items:center;justify-content:center;color:#07101f;font-weight:1000;font-size:20px;animation:logoFloat 2.8s ease-in-out infinite}

h1{margin:0;color:var(--blue);font-size:29px;line-height:1}.sub{color:var(--muted);font-size:13px;margin-top:6px}

.titlebox{background:linear-gradient(135deg,#11213b,#0e1728);border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:12px}.titlebox h2{margin:0 0 6px;font-size:26px}.titlebox p{margin:0;color:var(--muted);line-height:1.4}
.item{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0}.item h3{margin:0 0 8px;font-size:20px}.item p,.item li{color:var(--muted);line-height:1.55}
pre{white-space:pre-wrap;background:#030913;border:1px solid var(--line);border-radius:15px;padding:13px;overflow:auto;color:#dff3ff;font-size:13px;line-height:1.45}
.copy{border:0;background:var(--green);color:#06101d;border-radius:14px;padding:10px 12px;font-weight:900;margin-top:8px}.photo{border:1px dashed #557098;border-radius:16px;padding:18px;text-align:center;color:var(--muted);background:#091528;margin:10px 0}.photo b{color:var(--blue)}
.out{background:#07101f;border:1px solid var(--line);border-radius:15px;padding:12px;line-height:1.65;color:var(--muted);margin-top:10px}.kv{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.kv div{background:#07101f;border:1px solid var(--line);border-radius:14px;padding:10px;color:var(--muted)}

.footerName{position:fixed;bottom:58px;left:12px;right:12px;text-align:center;color:#8da0bd;font-size:13px;font-weight:800;pointer-events:none;z-index:25;text-shadow:0 2px 10px #000}

<body>

<section id="calc" class="section"><button class="back" onclick="goHome()">← Назад</button><div class="titlebox"><h2>IP калькулятор</h2><p>Введи адрес в формате 178.22.174.28/30.</p></div><div class="item"><input id="cidr" value="178.22.174.28/30" oninput="calcIP()"><button class="copy" onclick="calcIP()">Посчитать</button><div id="calcOut" class="out"></div></div></section>
<section id="gen" class="section"><button class="back" onclick="goHome()">← Назад</button><div class="titlebox"><h2>Генератор команд</h2><p>Выбери оборудование, задачу, VLAN и порт.</p></div><div class="item"><div class="row"><select id="gVendor" onchange="genCmd()"><option>SNR</option><option>Huawei</option><option>Eltex</option></select><select id="gTask" onchange="genCmd()"><option value="access">Access VLAN</option><option value="trunk">Trunk VLAN</option><option value="mgmt">IP управления</option><option value="check">Проверка</option></select><input id="gVlan" value="3573" oninput="genCmd()"><input id="gPort" value="1/0/2" oninput="genCmd()"><input id="gUplink" value="1/0/25" oninput="genCmd()"><input id="gIp" value="178.22.174.29/30" oninput="genCmd()"></div><pre id="genOut"></pre><button class="copy" onclick="copyBlock('genOut')">Копировать</button></div></section>
</main>
<div class="footerName">Orynbekov</div>
<nav><button id="navHome" class="active" onclick="goHome()">Главная</button><button onclick="openPage('switches')">Коммутаторы</button><button onclick="openPage('alarms')">Аварии</button><button onclick="showCalc()">IP</button><button onclick="showGen()">Генератор</button></nav>

show ports

show config current_config`],['Web VLAN общий порядок','L2 Features → VLAN → 802.1Q VLAN → Add VLAN → Tagged uplink → Untagged client → PVID Settings → Save Configuration.']]},

['Фото 1 — Login',`<div class="photo"><b>Фото Login</b><br>Сюда позже добавим скрин входа D-Link.</div>

['Базовая проверка',`show version

function setLang(l){lang=l;ruBtn.classList.toggle('active',l==='ru');kzBtn.classList.toggle('active',l==='kz');subtitle.textContent=ui[l].sub;search.placeholder=ui[l].search;navHome.textContent=ui[l].home}
function renderHome(){homeCards.innerHTML='';cards.forEach(c=>{let d=document.createElement('div');d.className='card '+(['switches','alarms','calc','generator','dlinkweb','tools'].includes(c[0])?'full':'');d.onclick=()=>c[0]==='calc'?showCalc():c[0]==='generator'?showGen():openPage(c[0]);d.innerHTML=`<h2>${c[1]}</h2><p>${c[2]}</p><span class="badge">${c[3]}</span>`;homeCards.appendChild(d)})}
function activeNav(){document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'))}
function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo(0,0)}
function goHome(){show('home');activeNav();navHome.classList.add('active')}
function showCalc(){show('calc');activeNav();calcIP()}
function showGen(){show('gen');activeNav();genCmd()}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function openPage(id){let p=pages[id];if(!p)return;show('page');activeNav();let h=`<div class="titlebox"><h2>${p.title}</h2><p>${p.desc}</p></div>`;p.items.forEach((it,i)=>{let content=String(it[1]);let body=content.includes('<div class="photo">')?content:`<pre id="code_${i}">${escapeHtml(content)}</pre><button class="copy" onclick="copyBlock('code_${i}')">Копировать</button>`;h+=`<div class="item"><h3>${it[0]}</h3>${body}</div>`});pageContent.innerHTML=h}
function copyBlock(id){let t=document.getElementById(id).innerText;if(navigator.clipboard)navigator.clipboard.writeText(t)}
function ipToInt(ip){return ip.split('.').reduce((a,o)=>(a<<8)+(+o),0)>>>0}
function intToIp(n){return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.')}
function calcIP(){let v=cidr.value.trim(),m=v.match(/^(\d{1,3}(?:\.\d{1,3}){3})\/(\d{1,2})$/);if(!m){calcOut.innerHTML='Формат: <b>178.22.174.28/30</b>';return}let parts=m[1].split('.').map(Number);if(parts.some(x=>x<0||x>255)){calcOut.innerHTML='Ошибка IP';return}let c=+m[2];let ip=ipToInt(m[1]),mask=(0xffffffff<<(32-c))>>>0,net=ip&mask,b=(net|(~mask))>>>0,first=c>=31?net:net+1,last=c>=31?b:b-1;calcOut.innerHTML=`<div class="kv"><div>Сеть<br><b>${intToIp(net)}</b></div><div>Маска<br><b>${intToIp(mask)}</b></div><div>Первый IP<br><b>${intToIp(first)}</b></div><div>Последний IP<br><b>${intToIp(last)}</b></div><div>Broadcast<br><b>${intToIp(b)}</b></div></div>`}
function maskFromCidr(s){let m=s.match(/\/(\d+)/);if(!m)return '255.255.255.252';let c=+m[1],mask=(0xffffffff<<(32-c))>>>0;return intToIp(mask)}
function ipOnly(s){return s.split('/')[0]}
function genCmd(){let v=gVendor.value,t=gTask.value,vl=gVlan.value||'3573',p=gPort.value||'1/0/2',u=gUplink.value||'1/0/25',ip=gIp.value||'178.22.174.29/30',mask=maskFromCidr(ip);let cmd='';if(v==='SNR'){if(t==='access')cmd=`configure terminal
vlan ${vl}
exit
interface ethernet ${p}
switchport mode access
switchport access vlan ${vl}
no shutdown
exit
write`;if(t==='trunk')cmd=`configure terminal
vlan ${vl}
exit
interface ethernet ${u}
switchport mode trunk
switchport trunk allowed vlan add ${vl}
exit
write`;if(t==='mgmt')cmd=`configure terminal
interface vlan ${vl}
ip address ${ipOnly(ip)} ${mask}
no shutdown
exit
write`;if(t==='check')cmd=`show vlan
show interface status
show mac address-table
show arp`;}
if(v==='Huawei'){if(t==='access')cmd=`system-view
vlan batch ${vl}
interface GigabitEthernet0/0/${p.split('/').pop()}
port link-type access
port default vlan ${vl}
