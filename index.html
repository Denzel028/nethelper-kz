.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:8px;margin-bottom:10px}.tabs button{white-space:nowrap;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:999px;padding:10px 13px;font-weight:900}.tabs button.active{background:var(--blue);color:#07101f}
.result{display:none}.result.active{display:block}.small{font-size:12px;color:var(--muted)}
.footerName{position:fixed;bottom:58px;left:12px;right:12px;text-align:center;color:#7f90aa;font-size:12px;pointer-events:none;z-index:25}

<section id="gen" class="section"><button class="back" onclick="goHome()">← Назад</button><div class="titlebox"><h2>Генератор команд</h2><p>Выбери оборудование, задачу, VLAN и порт. Команды появятся сразу.</p></div><div class="item"><div class="row"><select id="gVendor" onchange="genCmd()"><option>SNR</option><option>Huawei</option><option>Eltex</option></select><select id="gTask" onchange="genCmd()"><option value="access">Access VLAN</option><option value="trunk">Trunk VLAN</option><option value="mgmt">IP управления</option><option value="check">Проверка</option></select><input id="gVlan" value="3573" oninput="genCmd()" placeholder="VLAN"><input id="gPort" value="1/0/2" oninput="genCmd()" placeholder="Порт"><input id="gUplink" value="1/0/25" oninput="genCmd()" placeholder="Uplink"><input id="gIp" value="178.22.174.29/30" oninput="genCmd()" placeholder="IP/CIDR"></div><pre id="genOut"></pre><button class="copy" onclick="copyBlock('genOut')">Копировать</button></div></section>
</main>
<div class="footerName">Created for field engineers • Orynbekov</div>

switches:{title:'Коммутаторы и оборудование',desc:'Список оборудования из твоей практики. Открывай нужный раздел и копируй команды.',items:[
['SNR','SNR-S2995G-24FX, SNR-S2982G-24TE: основной раздел для VLAN, trunk, access, management IP.'],
['Huawei','Huawei S5700 и Huawei DSLAM: display команды, vlan batch, Vlanif, route-static.'],
['Eltex','Eltex MES и LTP-16N: коммутаторы и OLT.'],
['D-Link','DGS-3620-28SC / DGS-3630-28SC: VLAN, FDB, ports, web-интерфейс.'],
['Zyxel','XGS3700-48HP и 8-port модели: tagged/untagged/PVID.'],
['BDCOM','OLT/ONU: регистрация ONU, PON, VLAN, MAC.'],

snr:{title:'SNR — S2995G-24FX / S2982G',desc:'VLAN, access, trunk, PVID, IP управления, диагностика.',items:[
['Создать VLAN',`configure terminal

name CLIENT_3573
exit
write`],
['Удалить VLAN',`configure terminal

write`],
['Access порт',`configure terminal
vlan 3573
exit

exit
write`],
['Trunk порт / добавить VLAN',`configure terminal

no shutdown

write`],

huawei:{title:'Huawei — S5700 / DSLAM',desc:'VRP команды: VLAN, access, trunk, Vlanif, route-static, display.',items:[
['Создать VLAN',`system-view
vlan batch 3573

vlan batch 3573

save`],

display mac-address
display arp

display current-configuration`],
['DSLAM Huawei: платы/скорость',`display board
display version
display interface
display current-configuration
display alarm active
display cpu-usage
display memory-usage`]
]},
eltex:{title:'Eltex — MES / LTP-16N',desc:'MES VLAN/trunk/access и базовая диагностика OLT LTP.',items:[
['MES Access VLAN',`configure
vlan 3573
exit
interface gigabitethernet 1/0/2
switchport mode access
switchport access vlan 3573
exit
copy running-config startup-config`],
['MES Trunk',`configure
vlan 3573
exit
interface gigabitethernet 1/0/25
switchport mode trunk
switchport trunk allowed vlan add 3573
exit
copy running-config startup-config`],
['MES Проверки',`show vlan
show interfaces status
show mac address-table
show arp
show running-config`],
['LTP-16N Проверки',`show interface
show configuration
show mac
show vlan
show pon
show onu
show alarms`]
]},
dlink:{title:'D-Link — DGS-3620/3630',desc:'CLI + Web-интерфейс D-Link для VLAN, портов, FDB/MAC.',items:[
['CLI Проверка',`show vlan
show ports
show fdb
show config current_config`],
['Web: создать VLAN',`1. Открыть IP коммутатора в браузере.
2. Войти под admin/local учёткой.
3. L2 Features → VLAN → 802.1Q VLAN.

3. Uplink порт поставить Tagged.

5. Apply.

['Web: access порт',`1. L2 Features → VLAN → 802.1Q VLAN.

['Web: MAC/FDB',`1. L2 Features → FDB / MAC Address Table.

3. Проверить, на каком порту он виден.
4. Если MAC виден только на uplink — проверять access порт, PVID, trunk, радиомост/следующий switch.`],
['Web: сохранить конфиг',`После любых изменений искать:
Save → Save Configuration

Если не сохранить — после перезагрузки настройки пропадут.`]
]},
zyxel:{title:'Zyxel — XGS3700 / 8-port',desc:'Web-логика: Fixed/Forbidden/Untagged/Tagged и PVID.',items:[
['Web VLAN логика',`VLAN → Static VLAN:
- Uplink: Fixed / Tagged
- Клиент: Fixed / Untagged
- Лишние порты: Forbidden или Normal

VLAN Port Setting:

['CLI Проверки',`show vlan
show interfaces status
show mac address-table
show running-config`],
['Если команды не работают','Часть Zyxel smart/web моделей имеет урезанный CLI. Настраивай через Web: VLAN table + PVID.']
]},
bdcom:{title:'BDCOM — OLT/ONU',desc:'ONU, PON, MAC, VLAN и диагностика регистрации.',items:[
['Проверка ONU',`show onu list
show pon onu-information
show interface epon 0/1
show running-config
show mac address-table`],
['ONU offline','Проверить оптический уровень, PON порт, серийник ONU, профиль, VLAN сервиса, uplink, MAC/ARP выше по сети.'],
['Скорость падает через OLT','Проверить профиль ONU, speed/duplex uplink, ошибки портов, bandwidth/profile, сравнить тест напрямую и через OLT.']
]},
iskratel:{title:'Iskratel — DSLAM Web/CLI',desc:'Порты, платы, профили линии и диагностика DSLAM через web-интерфейс.',items:[

['Web: проверить плату',`1. Открыть Status / Equipment / Shelf.

['Web: проверить DSL порт',`1. Открыть Access / DSL Ports / Subscribers.

3. Проверить состояние: Up/Down/Training.

5. Если Training/Down — проверить пару, кросс, модем, профиль.`],
['Web: профиль скорости',`1. Открыть Profiles / Line Profiles.
2. Проверить назначенный профиль на порту.

['Web: VLAN/PVC',`1. Открыть Service / VLAN / PVC.

['Web: перезапуск порта',`1. Найти DSL порт.

['Порядок диагностики DSL','Плата → порт абонента → профиль скорости → состояние линии → CRC/ошибки → VLAN/PVC → uplink.'],
['Модем не поднимается','Проверить пару, порт DSLAM, профиль, VPI/VCI или VLAN, питание, сплиттер, линию.']

webguides:{title:'Web интерфейсы — быстрые пути',desc:'Куда нажимать в web-интерфейсах. Фото добавим позже по твоим скриншотам.',items:[
['D-Link VLAN путь','L2 Features → VLAN → 802.1Q VLAN → Add VLAN → Tagged uplink → Untagged client → PVID Settings → Save Configuration.'],
['D-Link MAC путь','L2 Features → FDB / MAC Address Table → Search MAC → проверить порт.'],
['Zyxel VLAN путь','Advanced Application → VLAN → Static VLAN → Fixed/Tagged/Untagged → VLAN Port Setting → PVID → Save.'],
['Iskratel DSLAM путь','Status/Equipment → DSL Ports/Subscribers → Line Profile → Service/VLAN/PVC → Alarms/Logs.'],
['BDCOM OLT путь','ONU List → PON Port → ONU Profile → VLAN Service → MAC Table → Save/Write.']

tools:{title:'Полезные функции и памятки',desc:'Быстрые правила для работ на объекте.',items:[

4. PVID совпадает.
5. MAC клиента виден на нужном порту.
6. Проверить native VLAN/hybrid.
7. Сохранить конфиг.`],
['Неопознанная сеть Windows',`1. Проверить линк.
2. DHCP или static IP.
3. Проверить gateway.
4. Проверить VLAN/PVID.
5. Проверить ARP до шлюза.
6. Проверить MAC клиента.
7. Проверить кабель/патч-панель/радиомост.`],
['MAC только на uplink',`1. Проверить access порт клиента.
2. Проверить PVID.
3. Проверить port isolation/protection.
4. Проверить bridge/radio.
5. Проверить loop/STP.
6. Проверить broadcast/ARP.`],
['Линк есть, трафика нет',`1. VLAN membership.
2. Tagged/untagged.
3. PVID.
4. MAC learning.
5. CRC/FCS ошибки.
6. Speed/duplex.
7. ACL/security/protection.`],
['Скорость 100 вместо 1000',`1. Кабель 8 жил.
2. Обжим.
3. Auto-negotiation.
4. Не стоит ли force 100.
5. SFP/медиаконвертер.
6. CRC/FCS ошибки.`],
['Нет доступа к управлению',`1. Management VLAN.
2. IP управления.
3. Default gateway/route.
4. Management VLAN на uplink.
5. ACL.
6. PVID/порт не поменялся.
7. Пробовать из той же подсети.`]
]}
};
function setLang(l){lang=l;ruBtn.classList.toggle('active',l==='ru');kzBtn.classList.toggle('active',l==='kz');subtitle.textContent=ui[l].sub;search.placeholder=ui[l].search;navHome.textContent=ui[l].home}
function renderHome(){homeCards.innerHTML='';cards.forEach(c=>{let d=document.createElement('div');d.className='card '+(['switches','alarms','calc','generator','webguides','tools'].includes(c[0])?'full':'');d.onclick=()=>c[0]==='calc'?showCalc():c[0]==='generator'?showGen():openPage(c[0]);d.innerHTML=`<h2>${c[1]}</h2><p>${c[2]}</p><span class="badge">${c[3]}</span>`;homeCards.appendChild(d)})}
function activeNav(){document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'))}
function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo(0,0)}
function goHome(){show('home');activeNav();navHome.classList.add('active')}
function showCalc(){show('calc');activeNav();calcIP()}
function showGen(){show('gen');activeNav();genCmd()}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function openPage(id){let p=pages[id];if(!p)return;show('page');activeNav();let h=`<div class="titlebox"><h2>${p.title}</h2><p>${p.desc}</p></div>`;p.items.forEach((it,i)=>{h+=`<div class="item"><h3>${it[0]}</h3><pre id="code_${i}">${escapeHtml(it[1])}</pre><button class="copy" onclick="copyBlock('code_${i}')">Копировать</button></div>`});pageContent.innerHTML=h}
function copyBlock(id){let t=document.getElementById(id).innerText;if(navigator.clipboard)navigator.clipboard.writeText(t)}
function ipToInt(ip){return ip.split('.').reduce((a,o)=>(a<<8)+(+o),0)>>>0}
function intToIp(n){return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.')}
function calcIP(){let v=cidr.value.trim(),m=v.match(/^(\d{1,3}(?:\.\d{1,3}){3})\/(\d{1,2})$/);if(!m){calcOut.innerHTML='Формат: <b>178.22.174.28/30</b>';return}let parts=m[1].split('.').map(Number);if(parts.some(x=>x<0||x>255)){calcOut.innerHTML='Ошибка IP';return}let c=+m[2];if(c<1||c>32){calcOut.innerHTML='CIDR 1-32';return}let ip=ipToInt(m[1]),mask=(0xffffffff<<(32-c))>>>0,net=ip&mask,b=(net|(~mask))>>>0,first=c>=31?net:net+1,last=c>=31?b:b-1,hosts=c>=31?Math.pow(2,32-c):Math.max(0,Math.pow(2,32-c)-2);calcOut.innerHTML=`<div class="kv"><div>Сеть<br><b>${intToIp(net)}</b></div><div>Маска<br><b>${intToIp(mask)}</b></div><div>Первый IP<br><b>${intToIp(first)}</b></div><div>Последний IP<br><b>${intToIp(last)}</b></div><div>Broadcast<br><b>${intToIp(b)}</b></div><div>Host count<br><b>${hosts}</b></div></div><p>Для /30 часто: <b>${intToIp(first)}</b> устройство, <b>${intToIp(last)}</b> шлюз.</p>`}
function maskFromCidr(s){let m=s.match(/\/(\d+)/);if(!m)return '255.255.255.252';let c=+m[1],mask=(0xffffffff<<(32-c))>>>0;return intToIp(mask)}
function ipOnly(s){return s.split('/')[0]}
function genCmd(){let v=gVendor.value,t=gTask.value,vl=gVlan.value||'3573',p=gPort.value||'1/0/2',u=gUplink.value||'1/0/25',ip=gIp.value||'178.22.174.29/30',mask=maskFromCidr(ip);let port=v==='Huawei'?`GigabitEthernet0/0/${p.split('/').pop()}`:v==='Eltex'?`gigabitethernet ${p}`:`ethernet ${p}`;let upl=v==='Huawei'?`GigabitEthernet0/0/${u.split('/').pop()}`:v==='Eltex'?`gigabitethernet ${u}`:`ethernet ${u}`;let cmd='';if(v==='SNR'){if(t==='access')cmd=`configure terminal
vlan ${vl}
exit
interface ${port}
switchport mode access
switchport access vlan ${vl}
no shutdown
exit
write`;if(t==='trunk')cmd=`configure terminal
vlan ${vl}
exit
interface ${upl}
switchport mode trunk
switchport trunk allowed vlan add ${vl}
no shutdown
exit
write`;if(t==='mgmt')cmd=`configure terminal
interface vlan ${vl}
ip address ${ipOnly(ip)} ${mask}
no shutdown
exit
write`;if(t==='check')cmd=`show vlan
show interface status
show mac address-table
show arp`;}
if(v==='Huawei'){if(t==='access')cmd=`system-view
vlan batch ${vl}
interface ${port}
port link-type access
port default vlan ${vl}
quit
save`;if(t==='trunk')cmd=`system-view
vlan batch ${vl}
interface ${upl}
port link-type trunk
port trunk allow-pass vlan ${vl}
quit
save`;if(t==='mgmt')cmd=`system-view
interface Vlanif${vl}
ip address ${ipOnly(ip)} ${mask}
quit
save`;if(t==='check')cmd=`display vlan
display interface brief
display mac-address
display arp`;}
if(v==='Eltex'){if(t==='access')cmd=`configure
vlan ${vl}
exit
interface ${port}
switchport mode access
switchport access vlan ${vl}
exit
copy running-config startup-config`;if(t==='trunk')cmd=`configure
vlan ${vl}
exit
interface ${upl}
switchport mode trunk
switchport trunk allowed vlan add ${vl}
exit
copy running-config startup-config`;if(t==='mgmt')cmd=`configure
interface vlan ${vl}
ip address ${ipOnly(ip)} ${mask}
exit
copy running-config startup-config`;if(t==='check')cmd=`show vlan
show interfaces status
show mac address-table
show arp`;}
genOut.textContent=cmd}
search.addEventListener('input',e=>{let q=e.target.value.toLowerCase().trim();if(q.length<2){searchResult.classList.remove('active');searchResult.innerHTML='';return}let hits=[];Object.keys(pages).forEach(k=>{let p=pages[k],txt=(p.title+' '+p.desc+' '+p.items.map(x=>x.join(' ')).join(' ')).toLowerCase();if(txt.includes(q))hits.push(k)});searchResult.classList.add('active');searchResult.innerHTML=`<div class="item"><h3>Результаты поиска</h3>${hits.length?hits.map(h=>`<p onclick="openPage('${h}')">→ ${pages[h].title}</p>`).join(''):'<p>Ничего не найдено</p>'}</div>`});
renderHome();calcIP();genCmd();
</script>
