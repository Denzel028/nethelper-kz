function setLang(l){lang=l;ruBtn.classList.toggle('active',l==='ru');kzBtn.classList.toggle('active',l==='kz');let t=TXT[l];subtitle.textContent=t.sub;search.placeholder=t.search;heroTitle.textContent=t.hero;heroDesc.textContent=t.heroD;stat1.textContent=t.stat1;stat2.textContent=t.stat2;q1.textContent=t.q1;q2.textContent=t.q2;q3.textContent=t.q3;q4.textContent=t.q4;backBtn.textContent=t.back;backBtn2.textContent=t.back;backBtn3.textContent=t.back;calcTitle.textContent=t.calc;calcDesc.textContent=t.calcD;calcBtn.textContent=t.calcBtn;genTitle.textContent=t.gen;genDesc.textContent=t.genD;copyBtn.textContent=t.copy;navHome.textContent=t.home;navSw.textContent=t.switches;navAl.textContent=t.alarms;navGen.textContent=t.generator;renderHome()}
function renderHome(){homeCards.innerHTML='';CARDS[lang].forEach(c=>{let d=document.createElement('div');d.className='card '+(['dlinkweb','iskratel','wizard','afterwork','alarms'].includes(c[0])?'full':'');d.onclick=()=>c[0]==='calc'?showCalc():c[0]==='generator'?showGen():openPage(c[0]);d.innerHTML=`<h2>${c[1]}</h2><p>${c[2]}</p><span class="badge">${c[3]}</span>`;homeCards.appendChild(d)})}
function activeNav(){document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'))}
function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo(0,0)}
function goHome(){show('home');activeNav();navHome.classList.add('active')}
function showCalc(){show('calc');activeNav();calcIP()}
function showGen(){show('gen');activeNav();genCmd()}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function openPage(id){let p=PAGES[lang][id];if(!p)return;show('page');activeNav();let h=`<div class="titlebox"><h2>${p.title}</h2><p>${p.desc}</p></div>`;p.items.forEach((it,i)=>{let content=String(it[1]);let hasMock=content.includes('<div class="mock">');let body=hasMock?content:`<pre id="code_${i}">${escapeHtml(content)}</pre><button class="copy" onclick="copyBlock('code_${i}')">${TXT[lang].copy}</button>`;h+=`<div class="item"><h3>${it[0]}</h3>${body}</div>`});pageContent.innerHTML=h}
function copyBlock(id){let t=document.getElementById(id).innerText;if(navigator.clipboard)navigator.clipboard.writeText(t)}
function ipToInt(ip){return ip.split('.').reduce((a,o)=>(a<<8)+(+o),0)>>>0}
function intToIp(n){return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.')}
function calcIP(){let v=cidr.value.trim(),m=v.match(/^(\d{1,3}(?:\.\d{1,3}){3})\/(\d{1,2})$/);if(!m){calcOut.innerHTML='Формат: <b>178.22.174.28/30</b>';return}let parts=m[1].split('.').map(Number);if(parts.some(x=>x<0||x>255)){calcOut.innerHTML='Ошибка IP';return}let c=+m[2];let ip=ipToInt(m[1]),mask=(0xffffffff<<(32-c))>>>0,net=ip&mask,b=(net|(~mask))>>>0,first=c>=31?net:net+1,last=c>=31?b:b-1;calcOut.innerHTML=`<div class="kv"><div>Network<br><b>${intToIp(net)}</b></div><div>Mask<br><b>${intToIp(mask)}</b></div><div>First IP<br><b>${intToIp(first)}</b></div><div>Last IP<br><b>${intToIp(last)}</b></div><div>Broadcast<br><b>${intToIp(b)}</b></div></div>`}
function maskFromCidr(s){let m=s.match(/\/(\d+)/);if(!m)return '255.255.255.252';let c=+m[1],mask=(0xffffffff<<(32-c))>>>0;return intToIp(mask)}
function ipOnly(s){return s.split('/')[0]}
function genCmd(){let v=gVendor.value,t=gTask.value,vl=gVlan.value||'3573',p=gPort.value||'1/0/2',u=gUplink.value||'1/0/25',ip=gIp.value||'178.22.174.29/30',mask=maskFromCidr(ip);let cmd='';if(v==='SNR'){if(t==='access')cmd=`configure terminal
vlan ${vl}
exit
interface ethernet ${p}
switchport mode access
switchport access vlan ${vl}
no shutdown
exit
write`;if(t==='trunk')cmd=`configure terminal
vlan ${vl}
exit
interface ethernet ${u}
switchport mode trunk
switchport trunk allowed vlan add ${vl}
exit
write`;if(t==='mgmt')cmd=`configure terminal
interface vlan ${vl}
ip address ${ipOnly(ip)} ${mask}
no shutdown
exit
write`;if(t==='check')cmd=`show vlan
show interface status
show mac address-table
show arp`;}
if(v==='Huawei'){if(t==='access')cmd=`system-view
vlan batch ${vl}
interface GigabitEthernet0/0/${p.split('/').pop()}
port link-type access
port default vlan ${vl}
quit
save`;if(t==='trunk')cmd=`system-view
vlan batch ${vl}
interface GigabitEthernet0/0/${u.split('/').pop()}
port link-type trunk
port trunk allow-pass vlan ${vl}
quit
save`;if(t==='mgmt')cmd=`system-view
interface Vlanif${vl}
ip address ${ipOnly(ip)} ${mask}
quit
save`;if(t==='check')cmd=`display vlan
display interface brief
display mac-address
display arp`;}
if(v==='Eltex'){cmd=`show vlan
show interfaces status
show mac address-table
show arp`}
genOut.textContent=cmd}
search.addEventListener('input',e=>{let q=e.target.value.toLowerCase().trim();if(q.length<2){searchResult.classList.remove('active');searchResult.innerHTML='';return}let hits=[];Object.keys(PAGES[lang]).forEach(k=>{let p=PAGES[lang][k],txt=(p.title+' '+p.desc+' '+p.items.map(x=>x.join(' ')).join(' ')).toLowerCase();if(txt.includes(q))hits.push(k)});searchResult.classList.add('active');searchResult.innerHTML=`<div class="item"><h3>${TXT[lang].results}</h3>${hits.length?hits.map(h=>`<p onclick="openPage('${h}')">→ ${PAGES[lang][h].title}</p>`).join(''):'<p>'+TXT[lang].none+'</p>'}</div>`});
setLang('ru');calcIP();genCmd();
</script>
